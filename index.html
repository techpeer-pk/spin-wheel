<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a0a00;
    --surface: #2a1500;
    --surface2: #3a1f00;
    --accent: #f59e0b;
    --accent2: #ef4444;
    --accent3: #f97316;
    --text: #fff8ee;
    --muted: rgba(255,248,238,0.5);
    --border: rgba(245,158,11,0.2);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(245,158,11,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 90%, rgba(239,68,68,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(249,115,22,0.06) 0%, transparent 70%);
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,4,0,0.85);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal {
    background: var(--surface);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(245,158,11,0.15), 0 24px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.4s cubic-bezier(0.34,1.4,0.64,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-logo {
    text-align: center;
    margin-bottom: 6px;
    font-size: 36px;
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-sub {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
  }

  .field input::placeholder { color: rgba(255,248,238,0.25); }
  .field input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.18); }
  .error-msg { font-size: 12px; color: #ef4444; margin-top: 5px; display: none; }
  .error-msg.show { display: block; }

  .btn-start {
    width: 100%;
    margin-top: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a0a00;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 24px rgba(245,158,11,0.35);
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-start:hover { opacity: 0.92; }
  .btn-start:active { transform: scale(0.97); }

  /* ── MAIN WHEEL PAGE ── */
  .wheel-page {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 20px 32px;
  }

  .wheel-page.visible { display: flex; }

  /* Top info bar */
  .info-bar {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 20px 20px;
    padding: 14px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    animation: dropDown 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }

  @keyframes dropDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label {
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .info-value {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .info-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }

  .info-badge {
    background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.15));
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }

  /* Wheel section */
  .wheel-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 0;
  }

  .wheel-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  .scene {
    position: relative;
    width: 340px;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .glow-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(#f59e0b, #ef4444, #f97316, #fbbf24, #f59e0b);
    animation: rotateSlow 4s linear infinite;
    opacity: 0.65;
  }
  .glow-ring::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: var(--bg);
  }
  @keyframes rotateSlow { to { transform: rotate(360deg); } }

  .wheel-wrap {
    position: relative;
    width: 310px;
    height: 310px;
    z-index: 1;
  }

  .wheel-img {
    width: 310px;
    height: 310px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    cursor: pointer;
    will-change: transform;
    user-select: none;
    box-shadow: 0 0 50px rgba(245,158,11,0.35);
    transition: box-shadow 0.3s;
  }
  .wheel-img:hover { box-shadow: 0 0 70px rgba(245,158,11,0.55); }

  .pointer {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-top: 30px solid #00e5ff;
    filter: drop-shadow(0 0 8px rgba(0,229,255,0.8));
    z-index: 10;
  }

  .center-pin {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 12px rgba(245,158,11,0.6);
    z-index: 20;
    pointer-events: none;
  }

  .hint {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    transition: color 0.3s;
  }
  .hint.active { color: var(--accent); }

  .spin-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a0a00;
    border: none;
    border-radius: 99px;
    padding: 13px 40px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 28px rgba(245,158,11,0.4);
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }
  .spin-btn:hover:not(:disabled) { opacity: 0.9; box-shadow: 0 6px 36px rgba(245,158,11,0.55); }
  .spin-btn:active:not(:disabled) { transform: scale(0.96); }
  .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .spin-count { font-size: 12px; color: rgba(255,248,238,0.22); min-height: 18px; letter-spacing: 0.5px; }

  .btn-back {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--muted);
    font-size: 12px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s, border-color 0.2s;
    z-index: 50;
  }
  .btn-back:hover { color: var(--accent); border-color: var(--accent); }

  @media (max-width: 480px) {
    .info-bar { flex-wrap: wrap; justify-content: center; }
    .info-divider { display: none; }
    .info-badge { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-logo">🎰</div>
    <h2>Spin the Wheel!</h2>
    <p class="modal-sub">Apni details fill karo aur spin karo!</p>

    <div class="field">
      <label>Aapka Naam</label>
      <input type="text" id="nameInput" placeholder="Naam likhein..." maxlength="40" required />
      <span class="error-msg" id="nameErr">⚠ Naam zaroor bharein!</span>
    </div>
    <div class="field">
      <label>Institution</label>
      <input type="text" id="instInput" placeholder="Institution ka naam..." maxlength="60" required />
      <span class="error-msg" id="instErr">⚠ Institution zaroor bharein!</span>
    </div>

    <button class="btn-start" onclick="startWheel()">🚀 Chalo Spin Karein!</button>
  </div>
</div>

<!-- WHEEL PAGE -->
<div class="wheel-page" id="wheelPage">

  <!-- Top info bar -->
  <div class="info-bar">
    <div class="info-item">
      <span class="info-label">Naam</span>
      <span class="info-value" id="displayName">—</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Institution</span>
      <span class="info-value" id="displayInst">—</span>
    </div>
    <div class="info-badge" id="spinBadge">0 Spins</div>
  </div>

  <div class="wheel-section">

    <p class="hint" id="hint">Wheel pe click karo ya button dabao!</p>
    <button class="spin-btn" id="spinBtn" onclick="spin()">🎲 Spin Karo!</button>
    <div class="spin-count" id="spinCount"></div>
  </div>
</div>

<button class="btn-back" id="btnBack" style="display:none;" onclick="goBack()">← Wapas Jao</button>

<script>
  let isSpinning = false;
  let currentAngle = 0;
  let spinCount = 0;

  const img = document.getElementById('wheelImg');
  const hint = document.getElementById('hint');
  const btn = document.getElementById('spinBtn');
  const spinBadge = document.getElementById('spinBadge');
  const spinCountEl = document.getElementById('spinCount');

  // Enter key support
  document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('instInput').focus(); });
  document.getElementById('instInput').addEventListener('keydown', e => { if(e.key==='Enter') startWheel(); });

  function startWheel() {
    const nameEl = document.getElementById('nameInput');
    const instEl = document.getElementById('instInput');
    const nameErr = document.getElementById('nameErr');
    const instErr = document.getElementById('instErr');
    let valid = true;
    nameEl.classList.remove('error'); nameErr.classList.remove('show');
    instEl.classList.remove('error'); instErr.classList.remove('show');
    if (!nameEl.value.trim()) { nameEl.classList.add('error'); nameErr.classList.add('show'); nameEl.focus(); valid = false; }
    if (!instEl.value.trim()) { instEl.classList.add('error'); instErr.classList.add('show'); if(valid) instEl.focus(); valid = false; }
    if (!valid) return;

    document.getElementById('displayName').textContent = nameEl.value.trim();
    document.getElementById('displayInst').textContent = instEl.value.trim();

    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('wheelPage').classList.add('visible');
    document.getElementById('btnBack').style.display = 'block';
  }

  function goBack() {
    document.getElementById('wheelPage').classList.remove('visible');
    document.getElementById('modalOverlay').style.display = 'flex';
    document.getElementById('btnBack').style.display = 'none';
    spinCount = 0;
    currentAngle = 0;
    img.style.transform = 'rotate(0deg)';
    spinBadge.textContent = '0 Spins';
    spinCountEl.textContent = '';
    hint.textContent = 'Wheel pe click karo ya button dabao!';
  }

  function spin() {
    if (isSpinning) return;
    isSpinning = true;
    btn.disabled = true;
    hint.textContent = 'Spinning... 🌀';
    hint.classList.add('active');

    const extraDeg = 360 * (6 + Math.floor(Math.random() * 6)) + Math.random() * 360;
    const targetAngle = currentAngle + extraDeg;
    const duration = 4000 + Math.random() * 1500;
    const startTime = performance.now();
    const startAngle = currentAngle;

    function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

    function frame(now) {
      const t = Math.min((now - startTime) / duration, 1);
      currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
      img.style.transform = 'rotate(' + currentAngle + 'deg)';
      if (t < 1) { requestAnimationFrame(frame); return; }
      currentAngle = currentAngle % 360;
      isSpinning = false;
      btn.disabled = false;
      spinCount++;
      hint.textContent = 'Phir spin karo!';
      hint.classList.remove('active');
      spinBadge.textContent = spinCount + ' Spin' + (spinCount > 1 ? 's' : '');
      spinCountEl.textContent = 'Total spins: ' + spinCount;
    }

    requestAnimationFrame(frame);
  }
</script>
